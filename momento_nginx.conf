server {
    listen 80;
    server_name _; # This acts as a catch-all for any IP or Domain pointed here

    location / {
        proxy_pass http://localhost:5000; # Forwards traffic to Node.js/PM2
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
