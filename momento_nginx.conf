server {
    listen 80;
    server_name _; # Replace with your domain if available

    # Path to the build folder of your React app
    root /var/www/momento/build;
    index index.html;

    # Frontend Routing
    location / {
        try_files $uri /index.html;
    }

    # Backend API Proxy
    location /api {
        proxy_pass http://localhost:5000; # Forwards to Node.js backend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Security/CORS settings (optional but recommended)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Deny access to .env files
    location ~ /\.env {
        deny all;
    }
}

