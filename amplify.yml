# ═════════════════════════════════════════════════════════════════════
#  MomentO — AWS Amplify Build Specification
#  This file configures the build process for your React Frontend.
# ═════════════════════════════════════════════════════════════════════

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci  # Clean install dependencies
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
